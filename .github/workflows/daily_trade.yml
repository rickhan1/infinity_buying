name: Daily Infinite Buying Simulation

on:
  schedule:
    # EDT 기간 (3월~11월): 장마감 4PM ET + 30분 = 4:30 PM ET = 20:30 UTC
    - cron: '30 20 * * 1-5'
    # EST 기간 (11월~3월): 장마감 4PM ET + 30분 = 4:30 PM ET = 21:30 UTC
    - cron: '30 21 * * 1-5'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  simulate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install video dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ffmpeg fonts-nanum
          # ImageMagick 보안 취약점 정책 우회 (TextClip 사용 허용)
          sudo sed -i '/<policy domain="path" rights="none" pattern="@\*"/d' /etc/ImageMagick-6/policy.xml

      - name: Restore YouTube Tokens
        run: |
          echo "${{ secrets.YOUTUBE_CLIENT_SECRET_B64 }}" | base64 -d -i > client_secret.json
          mkdir -p execution/youtube
          echo "${{ secrets.YOUTUBE_TOKEN_KO_B64 }}" | base64 -d -i > execution/youtube/token_ko.pickle
          # 영어 채널 토큰은 있을 경우에만 전개
          if [ -n "${{ secrets.YOUTUBE_TOKEN_EN_B64 }}" ]; then
            echo "${{ secrets.YOUTUBE_TOKEN_EN_B64 }}" | base64 -d -i > execution/youtube/token_en.pickle
          fi

      - name: Process Daily Trade
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          source venv/bin/activate
          # 매수 및 대시보드 갱신
          python execution/daily_run.py
          
      - name: Playwright install browsers
        run: |
          source venv/bin/activate
          playwright install --with-deps chromium
          
      - name: Generate and Upload YouTube Shorts
        run: |
          source venv/bin/activate
          
          # CDN 캐시 레이아웃 방어를 위해 가장 최근 생성된 매매 데이터를 프론트엔드 정적 폴더에 강제 복제
          mkdir -p frontend/public/data
          cp data/state.json frontend/public/data/state.json
          
          # 레이스 컨디션 배제 및 최신 JSON 데이터 캡쳐용 로컬서버 가동
          cd frontend
          npm install
          npm run dev &
          sleep 10
          cd ..
          PYTHONPATH=. python execution/youtube/daily_shorts.py

      - name: Commit and push state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git diff --cached --quiet || git commit -m "📊 Daily trade update: $(date -u +%Y-%m-%d)"
          git push
