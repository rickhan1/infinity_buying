name: Daily Infinite Buying Simulation

on:
  schedule:
    # EDT 기간 (3월~11월): 장마감 4PM ET + 30분 = 4:30 PM ET = 20:30 UTC
    - cron: '30 20 * * 1-5'
    # EST 기간 (11월~3월): 장마감 4PM ET + 30분 = 4:30 PM ET = 21:30 UTC
    - cron: '30 21 * * 1-5'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  simulate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install video dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ffmpeg fonts-nanum
          # ImageMagick 보안 취약점 정책 우회 (TextClip 사용 허용)
          sudo sed -i '/<policy domain="path" rights="none" pattern="@\*"/d' /etc/ImageMagick-6/policy.xml

      - name: Restore YouTube Tokens
        env:
          CLIENT_SECRET_B64: ${{ secrets.YOUTUBE_CLIENT_SECRET_B64 }}
          TOKEN_KO_B64: ${{ secrets.YOUTUBE_TOKEN_KO_B64 }}
          TOKEN_EN_B64: ${{ secrets.YOUTUBE_TOKEN_EN_B64 }}
        run: |
          # Python을 사용하여 공백/줄바꿈 등이 포함된 경우에도 안전하게 디코딩
          python3 -c "
          import base64, os
          def decode(env_name, path):
              val = os.environ.get(env_name, '').strip()
              if not val: return
              # base64 유효 문자만 추출
              clean = ''.join(c for c in val if c in 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/')
              # 누락된 패딩(=) 기호 자동 보정 (4의 배수)
              clean += '=' * ((4 - len(clean) % 4) % 4)
              try:
                  with open(path, 'wb') as f: f.write(base64.b64decode(clean))
              except Exception as e:
                  print(f'Error decoding {env_name}: {e}')
          
          decode('CLIENT_SECRET_B64', 'client_secret.json')
          os.makedirs('execution/youtube', exist_ok=True)
          decode('TOKEN_KO_B64', 'execution/youtube/token_ko.pickle')
          decode('TOKEN_EN_B64', 'execution/youtube/token_en.pickle')
          "

      - name: Process Daily Trade
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          # 매수 및 대시보드 갱신
          python execution/daily_run.py
          
      - name: Playwright install browsers
        run: |
          playwright install --with-deps chromium
          
      - name: Generate and Upload YouTube Shorts
        run: |
          # CDN 캐시 레이아웃 방어를 위해 가장 최근 생성된 매매 데이터를 프론트엔드 정적 폴더에 강제 복제
          mkdir -p frontend/public/data
          cp data/state.json frontend/public/data/state.json
          
          # 레이스 컨디션 배제 및 최신 JSON 데이터 캡쳐용 로컬서버 가동 (--host 추가로 접속 안정성 확보)
          cd frontend
          npm install
          npm run dev -- --host &
          # 서버가 완전히 뜰 때까지 충분히 대기
          sleep 15
          cd ..
          PYTHONPATH=. python execution/youtube/daily_shorts.py

      - name: Commit and push state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git diff --cached --quiet || git commit -m "📊 Daily trade update: $(date -u +%Y-%m-%d)"
          git push
